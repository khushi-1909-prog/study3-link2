<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart • Striped T‑Shirt</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="navbar">
    <a href="clothing_stripedshirt.html" class="icon-btn"><i class="fas fa-arrow-left"></i></a>
    <h1 class="brand">Your Cart</h1>
    <span class="icon-btn badge">1</span>
  </header>

  <main class="container cart-page">
    <section class="cart-item">
      <img src="new images/product1.jpg"  alt="Classic Professional Briefcase">
      <div>
        <h3>Classic Professional Briefcase</h3>
        <p>Price: $ 22.50</p>
        <p>Shipping: <span style="color: green;">Free Shipping</span></p>

        <p class="total">Total: $ 22.50</p>
      </div>
    </section>

<button onclick="postToCommunity()" class="btn full place-order">
  Place Order
</button>
  </main>
  <script>
  function postToCommunity() {
  const productData = {
    name: "Classic Professional Briefcase",
    image: "new images/product1.jpg"
  };

  localStorage.setItem("selectedProduct", JSON.stringify(productData));

  window.location.href = "styling-success.html"; // 👈 go to middle page first
}
  </script>
</body>
</html>
